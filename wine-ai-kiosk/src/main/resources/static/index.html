<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinothek AI — Wine Kiosk</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- App Header -->
<header class="app-header">
  <span style="font-size:1.8rem;">🍷</span>
  <div>
    <h1>Vinothek AI</h1>
    <p class="subtitle">Your personal AI wine sommelier</p>
  </div>
  <a href="/admin.html" style="margin-left:auto;font-size:0.78rem;color:var(--text-muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;">
    ⚙ Admin
  </a>
</header>

<!-- Tab Navigation -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="chat">💬 Sommelier</button>
  <button class="tab-btn" data-tab="browse">🔍 Browse Wines</button>
</nav>

<!-- ===================== CHAT TAB ===================== -->
<div id="tab-chat" class="tab-content active">
  <div class="chat-layout">

    <!-- Left: Chat Panel -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome message injected by JS -->
      </div>

      <!-- Quick Suggestions -->
      <div class="suggestions-bar">
        <button class="suggestion-btn" data-msg="I want a fruity red wine for pasta under 15€">🍝 Red for pasta &lt;15€</button>
        <button class="suggestion-btn" data-msg="Can you recommend a dry white wine from Germany?">🇩🇪 German white</button>
        <button class="suggestion-btn" data-msg="I need a sweet dessert wine">🍮 Sweet dessert wine</button>
        <button class="suggestion-btn" data-msg="What Italian dry reds do you have?">🇮🇹 Italian dry red</button>
        <button class="suggestion-btn" data-msg="I want something refreshing for summer under 12€">☀️ Summer wine &lt;12€</button>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-area">
        <input
          type="text"
          id="chatInput"
          class="chat-input"
          placeholder="Ask your sommelier… e.g. 'A bold red for steak'"
          maxlength="500"
        />
        <button class="send-btn" id="sendBtn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: Recommended Wines Sidebar -->
    <div class="wines-sidebar">
      <div class="wines-sidebar-header">
        <h3>🍾 Recommended Wines</h3>
      </div>
      <div class="wines-sidebar-list" id="recommendedWines">
        <div class="empty-state">
          <div class="icon">🍷</div>
          <p>Ask the sommelier for personalised recommendations</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===================== BROWSE TAB ===================== -->
<div id="tab-browse" class="tab-content">
  <div class="browse-layout">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <select id="filterType" class="filter-select">
        <option value="">All Types</option>
        <option>Red</option>
        <option>White</option>
        <option>Rosé</option>
      </select>
      <select id="filterCountry" class="filter-select">
        <option value="">All Countries</option>
      </select>
      <select id="filterRegion" class="filter-select">
        <option value="">All Regions</option>
      </select>
      <select id="filterGrape" class="filter-select">
        <option value="">All Grapes</option>
      </select>
      <select id="filterSweetness" class="filter-select">
        <option value="">Any Sweetness</option>
        <option>Dry</option>
        <option>Semi-Dry</option>
        <option>Sweet</option>
      </select>
      <input type="number" id="filterMaxPrice" class="filter-input" placeholder="Max price €" min="0" max="500" style="max-width:120px;" />
      <input type="text" id="filterSearch" class="filter-input" placeholder="🔍 Search…" style="max-width:160px;" />
      <button class="reset-btn" id="resetFilters">✕ Reset</button>
    </div>

    <p class="wine-count" id="wineCount"></p>

    <!-- Wine Grid -->
    <div class="wine-grid" id="wineGrid">
      <!-- populated by JS -->
    </div>

  </div>
</div>

<!-- Wine Detail Modal -->
<div class="modal-overlay" id="wineModal">
  <div class="modal">
    <button class="modal-close" id="closeModal">✕</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
